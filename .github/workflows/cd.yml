name: CD - Build and Push to ACR

on:
  push:
    branches: ["main"]
  workflow_dispatch:

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Azure Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ secrets.AZ_ACR_LOGIN_SERVER }}
          username: ${{ secrets.AZ_ACR_CLIENT_ID }}
          password: ${{ secrets.AZ_ACR_CLIENT_SECRET }}

      - name: Build and push Client
        uses: docker/build-push-action@v5
        with:
          context: ./client
          file: ./client/Dockerfile
          push: true
          tags: |
            ${{ secrets.AZ_ACR_LOGIN_SERVER }}/client:latest
            ${{ secrets.AZ_ACR_LOGIN_SERVER }}/client:${{ github.sha }}
            ${{ secrets.AZ_ACR_LOGIN_SERVER }}/client:${{ github.run_number }}

      - name: Build and push Server
        uses: docker/build-push-action@v5
        with:
          context: ./server
          file: ./server/Dockerfile
          push: true
          tags: |
            ${{ secrets.AZ_ACR_LOGIN_SERVER }}/server:latest
            ${{ secrets.AZ_ACR_LOGIN_SERVER }}/server:${{ github.sha }}
            ${{ secrets.AZ_ACR_LOGIN_SERVER }}/server:${{ github.run_number }}

      - name: Deploy to VM
        uses: appleboy/ssh-action@v0.1.7
        with:
          host: ${{ secrets.VM_HOST }}
          username: ${{ secrets.VM_USERNAME }}
          password: ${{ secrets.VM_PASSWORD }}
          script: |
            docker login ${{ secrets.AZ_ACR_LOGIN_SERVER }} \
              --username ${{ secrets.AZ_ACR_CLIENT_ID }} \
              --password ${{ secrets.AZ_ACR_CLIENT_SECRET }}  
            cd /home/${{ secrets.VM_USERNAME }}/lms
            docker compose pull
            docker compose up -d
            docker image prune -f