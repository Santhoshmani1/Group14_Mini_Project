name: lms-docker

services:
  client:
    build:
      context: ./client
      dockerfile: Dockerfile
    ports:
      - "80:80"
    restart: always
    networks:
      - lms-network

  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    environment:
      - PORT=3000
      - DB_HOST=db
      - DB_USERNAME=root
      - DB_PORT=3306
      - DB_PASSWORD=secret123
      - DB_DATABASE=lms
      - ALLOWED_ORIGIN=http://localhost
    restart: always
    networks:
      - lms-network
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  db:
    image: mysql:8.0
    environment:
      - MYSQL_ROOT_PASSWORD=secret123
      - MYSQL_DATABASE=lms
    restart: always
    networks:
      - lms-network
    volumes:
      - db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-psecret123"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

volumes:
  db_data:
    driver: local

networks:
  lms-network:
    driver: bridge
